<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Diri - Ahmad Fauzan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            border: 3px solid #3498db;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top; /* Mengatur fokus foto agar pas di wajah */
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .title {
            color: #7f8c8d;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-bottom: 20px;
        }

        .info-table td {
            padding: 10px 5px;
            font-size: 16px;
        }

        .info-table td.label {
            font-weight: 600;
            color: #34495e;
            width: 35%;
        }

        .info-table td.value {
            color: #555;
        }

        .info-table td.value a {
            color: #3498db;
            text-decoration: none;
        }

        .info-table td.value a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #bdc3c7;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar-container">
            <img src="foto-fauzan.jpg" alt="Foto Ahmad Fauzan">
        </div>
        
        <h2>Ahmad Fauzan</h2>
        <div class="title">Mahasiswa</div>
        
        <table class="info-table">
            <tr>
                <td class="label">Nama Lengkap</td>
                <td class="value">: Ahmad Fauzan</td>
            </tr>
            <tr>
                <td class="label">NPM</td>
                <td class="value">: 2410010340</td>
            </tr>
            <tr>
                <td class="label">Kelas</td>
                <td class="value">: 4N</td>
            </tr>
            <tr>
                <td class="label">No. WA</td>
                <td class="value">: <a href="https://wa.me/6282246196669" target="_blank">082246196669</a></td>
            </tr>
            <tr>
                <td class="label">Email</td>
                <td class="value">: <a href="mailto:ozanfauzan99@gmail.com">ozanfauzan99@gmail.com</a></td>
            </tr>
            <tr>
                <td class="label">Status</td>
                <td class="value">: Aktif</td>
            </tr>
        </table>

        <div class="footer">
            © 2026 Ahmad Fauzan. All Rights Reserved.
        </div>
    </div>

</body>
</html>
